# Root configuration for xiaomei project
# This file is used by deploy.sh to generate backend/config.yml

server:
  port: "8080"

mongodb:
  uri: "mongodb://localhost:27017"
  database: "mt_backend"
  collections:
    users: "users"
    invite_codes: "invite_codes"
    raw_problems: "raw_problems"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0
  keys: 
    "upload_queue": "upload_queue"

elasticsearch:
  addresses:
    - "http://localhost:9200"
  index: "problems"

# Note: session configuration will be generated by deploy.sh
# with a random secret and environment-appropriate settings
